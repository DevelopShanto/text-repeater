<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Text Repeater - Shanto</title>
    <style>
        body { background: #000; color: #00f2ea; font-family: monospace; text-align: center; padding: 20px; }
        .box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; outline: none; }
        button { width: 90%; padding: 12px; background: #00f2ea; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; color: #000; }
        #output { background: #050505; padding: 15px; margin-top: 20px; white-space: pre-wrap; text-align: left; border: 1px solid #222; color: #fff; font-size: 14px; }
    </style>
</head>
<body>
    <h2>TEXT REPEATER (1000)</h2>
    <div class="box">
        <form method="POST">
            <input type="text" name="text" placeholder="কী রিপিট করতে চাও?" required>
            <input type="number" name="count" value="1000">
            <button type="submit">REPEAT NOW 🔥</button>
        </form>
        {% if result %}
        <div id="output">{{ result }}</div>
        {% endif %}
    </div>
</body>
</html>
