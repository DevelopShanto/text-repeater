<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Text Repeater - Shanto</title>
    <style>
        body { background: #0f0f0f; color: #00f2ea; font-family: sans-serif; text-align: center; padding: 20px; }
        .salem { color: #00f2ea; font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 0 15px rgba(0,242,234,0.1); }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
        button { width: 90%; padding: 12px; background: #00f2ea; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; margin-top: 10px; }
        #output { background: #111; padding: 15px; margin-top: 20px; text-align: left; border-radius: 8px; color: #ff0050; min-height: 50px; white-space: pre-wrap; border: 1px dashed #444; }
        .copy-btn { background: #ff0050; color: white; margin-top: 15px; }
        .footer { margin-top: 25px; font-size: 14px; }
        .tiktok { color: #ff0050; font-weight: bold; }
        .facebook { color: #1877f2; font-weight: bold; }
    </style>
</head>
<body>
    <div class="salem">As-salamu Alaykum</div>
    
    <div class="box">
        <h2 style="color: white;">🚀 Text Repeater Pro</h2>
        <form method="POST">
            <input type="text" name="text" placeholder="কী লিখবে? (যেমন: I Love You)" required>
            <input type="number" name="count" placeholder="কতবার? (১-১০০০)" required>
            <button type="submit">Repeat Magic ✨</button>
        </form>

        {% if repeated_text %}
        <button class="copy-btn" onclick="copy()">Copy All Text 📋</button>
        <div id="output">{{ repeated_text }}</div>
        {% endif %}
    </div>

    <div class="footer">
        <div class="tiktok">TikTok: @shanto2993</div>
        <div class="facebook">Facebook: Classic Boy Shanto</div>
    </div>

    <script>
        function copy() {
            var text = document.getElementById("output").innerText;
            navigator.clipboard.writeText(text);
            alert("সবগুলো কপি হয়ে গেছে! 🔥");
        }
    </script>
</body>
</html>
