<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intek Text Art - Shanto</title>
    <style>
        body { background: #000; color: #00f2ea; font-family: monospace; text-align: center; padding: 15px; }
        .salem { font-size: 24px; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 10px #00f2ea; }
        .header-info { background: linear-gradient(45deg, #ff0050, #00f2ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; margin-bottom: 25px; font-size: 15px; }
        .box { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; outline: none; }
        button { width: 90%; padding: 12px; background: #00f2ea; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; color: #000; }
        #output-container { width: 100%; overflow-x: auto; margin-top: 20px; background: #050505; border-radius: 10px; border: 1px solid #222; }
        #output { display: inline-block; text-align: left; white-space: pre; font-size: 7px; line-height: 1.1; color: #fff; padding: 20px; font-weight: bold; }
        .copy-btn { background: #ff0050; color: white; margin-top: 15px; width: auto; padding: 10px 30px; }
    </style>
</head>
<body>
    <div class="salem">As-salamu Alaykum</div>
    <div class="header-info">TikTok: @shanto2993 | FB: Classic Boy Shanto</div>
    <div class="box">
        <h2 style="color: #444; letter-spacing: 2px;">TEXT-IN-TEXT ART</h2>
        <form method="POST">
            <input type="text" name="name" placeholder="বড় অক্ষর (যেমন: SHANTO)" required>
            <input type="text" name="message" placeholder="পেটের ভেতর কী থাকবে? (যেমন: i love you)" required>
            <button type="submit">CREATE MAGIC 🔥</button>
        </form>
        {% if result %}
        <div id="output-container">
            <div id="output">{{ result }}</div>
        </div>
        <button class="copy-btn" onclick="copy()">COPY THIS ART 📋</button>
        {% endif %}
    </div>
    <script>
        function copy() {
            var text = document.getElementById("output").innerText;
            navigator.clipboard.writeText(text);
            alert("Art Copied Successfully! 🔥");
        }
    </script>
</body>
</html>
