<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Repeater</title>
    <style>
        body { background-color: black; color: #00e5ff; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: auto; }
        h1 { text-shadow: 0 0 10px #00e5ff; margin-bottom: 5px; }
        .info { color: #ff006e; font-weight: bold; margin-bottom: 20px; font-size: 14px; }
        input, textarea { width: 90%; background: #000; border: 1px solid #333; color: #00e5ff; padding: 12px; margin-bottom: 10px; border-radius: 10px; outline: none; }
        .btn-magic { width: 95%; background: #00e5ff; color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; margin-bottom: 10px; }
        .btn-copy { width: 95%; background: #28a745; color: white; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        #output { background: #000; border: 1px solid #333; padding: 15px; border-radius: 10px; text-align: left; white-space: pre-wrap; min-height: 100px; color: #fff; }
    </style>
</head>
<body>

    <h1>As-salamu Alaykum</h1>
    <div class="info">TikTok: @shanto2993 | FB: Classic Boy Shanto</div>

    <div class="container">
        <h2 style="color: #666;">TEXT REPEATER</h2>
        
        <textarea id="inputText" placeholder="Ki repeat korte chan?"></textarea>
        <input type="number" id="count" value="1000">
        
        <button class="btn-magic" onclick="repeatText()">REPEAT MAGIC 🔥</button>
        <button class="btn-copy" onclick="copyToClipboard()">COPY TEXT 📋</button>

        <div id="output"></div>
    </div>

    <script>
        function repeatText() {
            let text = document.getElementById('inputText').value;
            let num = document.getElementById('count').value;
            let result = "";
            if(!text) return alert("Kisu likhun!");
            for(let i=0; i<num; i++) {
                result += text + "\n";
            }
            document.getElementById('output').innerText = result;
        }

        function copyToClipboard() {
            let text = document.getElementById('output').innerText;
            if(!text) return alert("Copy korar moto kisu nei!");
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied Successfully! ✅");
            });
        }
    </script>
</body>
</html>
